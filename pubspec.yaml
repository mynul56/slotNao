name: turf_booking_app
description: SlotNao
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Networking
  dio: ^5.8.0
  web_socket_channel: ^3.0.3

  # Dependency Injection
  get_it: ^8.0.3

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Storage & Security
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  # Navigation
  go_router: ^14.8.1

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.3.1
  flutter_svg: ^2.1.0

  # Utilities
  intl: ^0.20.2
  connectivity_plus: ^6.1.4
  logger: ^2.5.0
  dartz: ^0.10.1
  rxdart: ^0.28.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.13
  freezed: ^2.5.2
  json_serializable: ^6.8.0

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
          weight: 400
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
